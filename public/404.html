<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 | Terara Printers</title>
    <link rel="llms.txt" href="/llms.txt" />`r`n    <meta name="theme-color" content="#ED1C24" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --red: #ed1c24;
        --dark: #111827;
        --light: #f9fafb;
      }
      * {
        box-sizing: border-box;
      }
      body {
        margin: 0;
        font-family: "Inter", sans-serif;
        color: var(--dark);
        background: radial-gradient(
            circle at 10% 10%,
            rgba(237, 28, 36, 0.12),
            transparent 40%
          ),
          radial-gradient(
            circle at 90% 90%,
            rgba(17, 24, 39, 0.12),
            transparent 35%
          ),
          var(--light);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 32px;
      }
      .card {
        width: min(920px, 100%);
        background: white;
        border-radius: 28px;
        box-shadow: 0 30px 80px rgba(17, 24, 39, 0.18);
        padding: 40px;
        position: relative;
        overflow: hidden;
      }
      .badge {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        background: rgba(237, 28, 36, 0.08);
        color: var(--red);
        padding: 8px 14px;
        border-radius: 999px;
        font-weight: 700;
        letter-spacing: 0.18em;
        font-size: 12px;
        text-transform: uppercase;
      }
      h1 {
        font-size: clamp(48px, 8vw, 96px);
        margin: 18px 0 8px;
        font-weight: 900;
        letter-spacing: -0.03em;
      }
      h2 {
        font-size: clamp(22px, 3vw, 30px);
        margin: 0 0 16px;
        font-weight: 800;
      }
      p {
        margin: 0 0 24px;
        color: #4b5563;
        font-size: 16px;
        line-height: 1.7;
      }
      .actions {
        display: flex;
        flex-wrap: wrap;
        gap: 12px;
      }
      .btn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        padding: 12px 20px;
        border-radius: 999px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 0.06em;
        font-size: 12px;
        text-decoration: none;
        border: 2px solid var(--dark);
        color: var(--dark);
        transition: transform 0.2s ease, box-shadow 0.2s ease;
      }
      .btn.primary {
        background: var(--red);
        color: white;
        border-color: var(--red);
        box-shadow: 0 10px 30px rgba(237, 28, 36, 0.25);
      }
      .btn:hover {
        transform: translateY(-2px);
      }
      .support {
        margin-top: 20px;
        font-size: 13px;
        color: #6b7280;
      }
      .accent {
        position: absolute;
        right: -120px;
        top: -120px;
        width: 260px;
        height: 260px;
        border-radius: 50%;
        background: radial-gradient(circle at 30% 30%, #ed1c24, #b40d14);
        opacity: 0.12;
      }
      .accent.bottom {
        left: -140px;
        top: auto;
        bottom: -140px;
        background: radial-gradient(circle at 30% 30%, #111827, #111827);
        opacity: 0.12;
      }
    </style>
  </head>
  <body>
    <main class="card">
      <div class="accent"></div>
      <div class="accent bottom"></div>
      <div class="badge">Error 404</div>
      <h1>Page Not Found</h1>
      <h2>Let’s get you back to printing.</h2>
      <p>
        The page you’re looking for doesn’t exist or was moved. Terara Printers
        can still help with quotes, timelines, and production support.
      </p>
      <div class="actions">
        <a class="btn primary" href="/">Go Home</a>
        <a class="btn" href="/#contact">Contact Us</a>
      </div>
      <div class="support">Need help? Call us at +251 988 559 355.</div>
    </main>
  </body>
</html>
